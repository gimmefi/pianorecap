function Serif({ children, size = 22, weight = 600, style = {} }) {
  return <div style={{ fontFamily: "'Newsreader', serif", fontWeight: weight, fontSize: size, color: C.ink, ...style }}>{children}</div>;
}

function Button({ children, onClick, variant = "primary", disabled, style = {} }) {
  const base = {
    padding: "13px 20px",
    borderRadius: 10,
    border: "none",
    fontSize: 14,
    fontWeight: 600,
    cursor: disabled ? "default" : "pointer",
    transition: "opacity 0.15s",
  };
  const variants = {
    primary: { background: disabled ? C.border : C.accent, color: "#FAF7F1" },
    secondary: { background: "transparent", color: C.accent, border: `1.5px solid ${C.border}` },
    ghost: { background: "transparent", color: C.muted },
  };
  return <button onClick={onClick} disabled={disabled} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
}

function Input({ label, ...props }) {
  const [showPassword, setShowPassword] = useState(false);
  const isPassword = props.type === "password";
  const inputType = isPassword ? (showPassword ? "text" : "password") : props.type;

  return (
    <div style={{ marginBottom: 16 }}>
      {label && <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 6 }}>{label}</div>}
      <div style={{ position: "relative" }}>
        <input {...props} type={inputType} style={{

          border: `1.5px solid ${C.border}`, fontSize: 15, color: C.ink, background: "#fff",
          ...(props.style || {}),
        }} />

          <div

            }}>
            {showPassword ? "🙈" : "👁"}

        )}

}

// ---------- Compact month calendar for next lesson ----------

function downloadIcs(studentName, dateObj) {
  const pad = n => String(n).padStart(2, "0");
  const fmt = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth() + 1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}00Z`;
  const start = new Date(dateObj);
  const end = new Date(start.getTime() + 30 * 60000);
  const ics = [
    "BEGIN:VCALENDAR", "VERSION:2.0", "BEGIN:VEVENT",
    `UID:${Date.now()}@musiclessonrecap`,
    `DTSTAMP:${fmt(new Date())}`,
    `DTSTART:${fmt(start)}`,
    `DTEND:${fmt(end)}`,
    `SUMMARY:Lesson with ${studentName}`,
    "BEGIN:VALARM", "TRIGGER:-P1D", "ACTION:DISPLAY", `DESCRIPTION:Lesson with ${studentName} tomorrow`, "END:VALARM",
    "END:VEVENT", "END:VCALENDAR",
  ].join("\r\n");
  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `lesson-${studentName.replace(/\s+/g, "-")}.ics`;
  a.click();
  URL.revokeObjectURL(url);
}

function MonthCalendar({ studentName, nextLessonAt, onSetLesson }) {
  const initial = nextLessonAt ? new Date(nextLessonAt) : new Date();
  const [viewMonth, setViewMonth] = useState(initial.getMonth());
  const [viewYear, setViewYear] = useState(initial.getFullYear());
  const [pickingDay, setPickingDay] = useState(null);
  const [pickTime, setPickTime] = useState("16:00");

  const lessonDate = nextLessonAt ? new Date(nextLessonAt) : null;
  const firstOfMonth = new Date(viewYear, viewMonth, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const cells = [...Array(startWeekday).fill(null), ...Array(daysInMonth).keys()].map(d => d === null ? null : d + 1);

  const changeMonth = (delta) => {
    let m = viewMonth + delta, y = viewYear;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    setViewMonth(m); setViewYear(y);
    setPickingDay(null);
  };

  const isLessonDay = (day) => lessonDate && lessonDate.getDate() === day && lessonDate.getMonth() === viewMonth && lessonDate.getFullYear() === viewYear;

  const confirmDay = async (day) => {
    const [hh, mm] = pickTime.split(":").map(Number);
    const d = new Date(viewYear, viewMonth, day, hh, mm, 0);
    await onSetLesson(d.toISOString());
    setPickingDay(null);
  };

  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginTop: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div onClick={() => changeMonth(-1)} style={{ cursor: "pointer", padding: "0 8px", color: C.muted }}>‹</div>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>
          {new Date(viewYear, viewMonth, 1).toLocaleDateString(undefined, { month: "long", year: "numeric" })}
        </div>
        <div onClick={() => changeMonth(1)} style={{ cursor: "pointer", padding: "0 8px", color: C.muted }}>›</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2, fontSize: 10, color: C.muted, textAlign: "center", marginBottom: 4 }}>
        {["S","M","T","W","T","F","S"].map((d,i) => <div key={i}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2 }}>
        {cells.map((day, i) => (
          <div key={i}
            onClick={() => day && setPickingDay(day)}
            style={{
              aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 12.5, borderRadius: 6, cursor: day ? "pointer" : "default",

        <div style={{ marginTop: 12, display: "flex", gap: 8, alignItems: "center" }}>

        <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.border}`, fontSize: 13, color: C.ink }}>

              📅 Add to calendar (reminds you 1 day before)
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function NewLessonNote({ studentId, onBack, onGenerated }) {
  const [text, setText] = useState("");
  const [listening, setListening] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [dictationLang, setDictationLang] = useState(() => localStorage.getItem("dictationLang") || "ru-RU");
  const recognitionRef = useRef(null);

  const toggleMic = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setError("Voice input isn't supported in this browser. You can still type your notes.");
      return;
    }
    if (listening) {
      recognitionRef.current && recognitionRef.current.stop();
      setListening(false);
      return;
    }
    const rec = new SpeechRecognition();
    rec.lang = dictationLang;
    rec.continuous = true;
    rec.interimResults = false;
    rec.onresult = (e) => {
      let chunk = "";
      for (let i = e.resultIndex; i < e.results.length; i++) chunk += e.results[i][0].transcript + " ";
      setText(prev => (prev ? prev + " " : "") + chunk.trim());
    };
    rec.onerror = () => setListening(false);
    rec.onend = () => setListening(false);
    recognitionRef.current = rec;
    rec.start();
    setListening(true);
  };

  const generate = async () => {
    setError(null);
    setLoading(true);
    try {
      const { data: student } = await supabase.from("students").select("*").eq("id", studentId).single();
      const resp = await fetch(GENERATE_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          mode: "draft",
          rawNotes: text,
          studentName: student.name,
          instrument: student.instrument,
          ageLevel: student.age_level,
          currentPiece: student.current_piece,
        }),
      });
      if (!resp.ok) {
        let detail = "";
        try { const errBody = await resp.json(); detail = errBody.error || errBody.detail || ""; } catch (_) {}
        throw new Error(`Generation failed (${resp.status}). ${detail}`.trim());
      }
      const result = await resp.json();
      onGenerated({
        studentId,
        rawNotes: text,
        assignmentLanguage: student.assignment_language || "english",
        draftAssignment: result.draftAssignment,
        draftParentUpdate: result.draftParentUpdate,
        teacherNote: result.teacherNote,
        detectedPiece: result.detectedPiece || null,
      });
    } catch (e) {
      setError(e.message || "Something went wrong.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", paddingBottom: 60 }}>
      <Header title="New lesson note" onBack={onBack} />
      <div style={{ padding: "8px 24px" }}>
        <div style={{ fontSize: 14, color: C.muted, marginBottom: 12, lineHeight: 1.5 }}>
          Type or dictate what happened in the lesson. A sentence or two is enough.
        </div>
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder='"Worked on measures 12–24 of Minuet in G. Left hand rhythm was uneven. Practice hands separately at 60 BPM."'
          style={{
            width: "100%", minHeight: 160, padding: 14, borderRadius: 10,
            border: `1.5px solid ${C.border}`, fontSize: 15, color: C.ink, lineHeight: 1.5, resize: "vertical",
          }}
        />

        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          <div
            onClick={() => { setDictationLang("ru-RU"); localStorage.setItem("dictationLang", "ru-RU"); }}
            style={{
              padding: "6px 14px", borderRadius: 8, fontSize: 13, cursor: "pointer",
              border: `1.5px solid ${dictationLang === "ru-RU" ? C.accent : C.border}`,
              color: dictationLang === "ru-RU" ? C.accent : C.muted,
              fontWeight: dictationLang === "ru-RU" ? 600 : 400,
            }}>
            Русский
          </div>
          <div
            onClick={() => { setDictationLang("en-US"); localStorage.setItem("dictationLang", "en-US"); }}
            style={{
              padding: "6px 14px", borderRadius: 8, fontSize: 13, cursor: "pointer",
              border: `1.5px solid ${dictationLang === "en-US" ? C.accent : C.border}`,
              color: dictationLang === "en-US" ? C.accent : C.muted,
              fontWeight: dictationLang === "en-US" ? 600 : 400,
            }}>
            English
          </div>
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
          <Button variant="secondary" onClick={toggleMic} style={{ flex: 1 }}>
            {listening ? "● Stop recording" : "🎙 Dictate"}
          </Button>
        </div>

        {error && <div style={{ color: C.warn, fontSize: 13, marginTop: 12 }}>{error}</div>}

        <Button onClick={generate} disabled={loading || !text.trim()} style={{ width: "100%", marginTop: 20 }}>
          {loading ? "Generating draft…" : "Generate draft"}
        </Button>
      </div>
    </div>
  );
}

function DraftReview({ draft, onApproved, onDiscard }) {
  const [draftAssignment, setDraftAssignment] = useState(draft.draftAssignment);
  const [draftParentUpdate, setDraftParentUpdate] = useState(draft.draftParentUpdate);
  const [teacherNote, setTeacherNote] = useState(draft.teacherNote);
  const [translating, setTranslating] = useState(false);
  const [error, setError] = useState(null);

  const approve = async () => {
    setError(null);
    setTranslating(true);
    try {
      const resp = await fetch(GENERATE_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          mode: "finalize",
          draftAssignment,
          draftParentUpdate,
          assignmentLanguage: draft.assignmentLanguage,
        }),
      });
      if (!resp.ok) {
        let detail = "";
        try { const errBody = await resp.json(); detail = errBody.error || errBody.detail || ""; } catch (_) {}
        throw new Error(`Translation failed (${resp.status}). ${detail}`.trim());
      }
      const result = await resp.json();
      onApproved({
        studentId: draft.studentId,
        rawNotes: draft.rawNotes,
        assignment: result.assignment,
        parentUpdate: result.parentUpdate,
        teacherNote,
        detectedPiece: draft.detectedPiece,
      });
    } catch (e) {
      setError(e.message || "Something went wrong.");
    } finally {
      setTranslating(false);
    }
  };

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", paddingBottom: 60 }}>
      <Header title="Review draft" onBack={onDiscard} />
      <div style={{ padding: "8px 24px" }}>
        <div style={{ fontSize: 14, color: C.muted, marginBottom: 16, lineHeight: 1.5 }}>
          This is a draft in the same language you dictated in. Check and edit anything before translating for sending.
        </div>

        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 0.5, color: C.accent, textTransform: "uppercase", marginBottom: 6 }}>
          Student assignment (draft)
        </div>
        <textarea
          value={draftAssignment}
          onChange={e => setDraftAssignment(e.target.value)}
          style={{ width: "100%", minHeight: 110, padding: 12, borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14.5, color: C.ink, lineHeight: 1.5, resize: "vertical", marginBottom: 16 }}
        />

        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 0.5, color: C.accent, textTransform: "uppercase", marginBottom: 6 }}>
          Parent update (draft)
        </div>
        <textarea
          value={draftParentUpdate}
          onChange={e => setDraftParentUpdate(e.target.value)}
          style={{ width: "100%", minHeight: 90, padding: 12, borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14.5, color: C.ink, lineHeight: 1.5, resize: "vertical", marginBottom: 16 }}
        />

        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 0.5, color: C.accent, textTransform: "uppercase", marginBottom: 6 }}>
          Note for next lesson (private — won't be translated)
        </div>
        <textarea
          value={teacherNote}
          onChange={e => setTeacherNote(e.target.value)}
          style={{ width: "100%", minHeight: 70, padding: 12, borderRadius: 10, border: `1.5px solid ${C.border}`, fontSize: 14.5, color: C.ink, lineHeight: 1.5, resize: "vertical" }}
        />

        {error && <div style={{ color: C.warn, fontSize: 13, marginTop: 12 }}>{error}</div>}

        <Button onClick={approve} disabled={translating} style={{ width: "100%", marginTop: 20 }}>
          {translating ? "Translating…" : "Looks good — translate for sending"}
        </Button>
      </div>
    </div>
  );
}

function ResultBlock({ label, text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 18, marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 0.5, color: C.accent, textTransform: "uppercase" }}>{label}</div>
        <div onClick={copy} style={{ fontSize: 12, color: C.muted, cursor: "pointer" }}>{copied ? "Copied ✓" : "Copy"}</div>
      </div>
      <div style={{ fontSize: 14.5, color: C.ink, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{text}</div>
    </div>
  );
}

function ResultScreen({ result, onSaved, onDiscard }) {
  const [saving, setSaving] = useState(false);
  const [student, setStudent] = useState(null);

  useEffect(() => {
    (async () => {
      const { data } = await supabase.from("students").select("*").eq("id", result.studentId).single();
      setStudent(data);
    })();
  }, [result.studentId]);

  const save = async () => {
    setSaving(true);
    const { data: { user } } = await supabase.auth.getUser();
    await supabase.from("lesson_notes").insert({
      student_id: result.studentId,
      teacher_id: user.id,
      raw_notes: result.rawNotes,
      assignment_text: result.assignment,
      parent_update_text: result.parentUpdate,
      teacher_note_text: result.teacherNote,
    });
    if (result.detectedPiece) {
      await supabase.from("students").update({ current_piece: result.detectedPiece }).eq("id", result.studentId);
    }
    setSaving(false);
    onSaved();
  };

  const combinedMessage = `${result.parentUpdate}\n\n${result.assignment}`;

  const sendWhatsapp = () => {
    const phone = (student?.parent_whatsapp || "").replace(/[^\d+]/g, "").replace(/^\+/, "");
    if (!phone) return;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(combinedMessage)}`, "_blank");
  };

  const sendStudentWhatsapp = () => {
    const phone = (student?.student_whatsapp || "").replace(/[^\d+]/g, "").replace(/^\+/, "");
    if (!phone) return;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(result.assignment)}`, "_blank");
  };

  const sendEmail = () => {
    const email = student?.parent_email || "";
    if (!email) return;
    const subject = `Lesson update — ${student?.name || ""}`;
    window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(combinedMessage)}`;
  };

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", paddingBottom: 60 }}>
      <Header title="Ready to send" onBack={onDiscard} />
      <div style={{ padding: "8px 24px" }}>
        <ResultBlock label="Student assignment" text={result.assignment} />
        <ResultBlock label="Parent update" text={result.parentUpdate} />
        <ResultBlock label="Note for next lesson (private)" text={result.teacherNote} />

        {(student?.parent_whatsapp || student?.parent_email) && (
          <div style={{ display: "flex", gap: 10, marginTop: 4, marginBottom: 8 }}>
            {student?.parent_whatsapp && (
              <Button variant="secondary" onClick={sendWhatsapp} style={{ flex: 1 }}>📱 Send to parent (WhatsApp)</Button>
            )}
            {student?.parent_email && (
              <Button variant="secondary" onClick={sendEmail} style={{ flex: 1 }}>✉️ Send via Email</Button>
            )}
          </div>
        )}

        {student?.student_whatsapp && (
          <div style={{ marginBottom: 8 }}>
            <Button variant="secondary" onClick={sendStudentWhatsapp} style={{ width: "100%" }}>📱 Send assignment to student (WhatsApp)</Button>
          </div>
        )}

        <Button onClick={save} disabled={saving} style={{ width: "100%", marginTop: 8 }}>
          {saving ? "Saving…" : "Save to student record"}
        </Button>
      </div>
    </div>
  );
}

function RepertoireFinder({ studentId, onBack }) {
  const [student, setStudent] = useState(null);
  const [query, setQuery] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [pieces, setPieces] = useState([]);

  useEffect(() => {
    (async () => {
      const { data } = await supabase.from("students").select("*").eq("id", studentId).single();
      setStudent(data);
    })();
  }, [studentId]);

  const search = async () => {
    if (!query.trim()) return;
    setError(null);
    setLoading(true);
    try {
      const resp = await fetch(GENERATE_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          mode: "repertoire",
          query,
          instrument: student?.instrument,
          ageLevel: student?.age_level,
        }),
      });
      if (!resp.ok) {
        let detail = "";
        try { const errBody = await resp.json(); detail = errBody.error || errBody.detail || ""; } catch (_) {}
        throw new Error(`Search failed (${resp.status}). ${detail}`.trim());
      }
      const result = await resp.json();
      setPieces(result.pieces || []);
    } catch (e) {
      setError(e.message || "Something went wrong.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ maxWidth: 560, margin: "0 auto", paddingBottom: 60 }}>
      <Header title="Find repertoire" onBack={onBack} />
      <div style={{ padding: "8px 24px" }}>
        <div style={{ fontSize: 14, color: C.muted, marginBottom: 12, lineHeight: 1.5 }}>
          Describe what you're looking for — instrument context is filled in automatically for {student?.name || "this student"}.
        </div>
        <textarea
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder='"A piece for a 10-year-old to work on staccato" or "Grade 3 violin piece with slow bowing practice"'
          style={{
            width: "100%", minHeight: 90, padding: 14, borderRadius: 10,
            border: `1.5px solid ${C.border}`, fontSize: 15, color: C.ink, lineHeight: 1.5, resize: "vertical",
          }}
        />
        <Button onClick={search} disabled={loading || !query.trim()} style={{ width: "100%", marginTop: 14 }}>
          {loading ? "Searching…" : "Find pieces"}
        </Button>

        {error && <div style={{ color: C.warn, fontSize: 13, marginTop: 12 }}>{error}</div>}

        {pieces.length > 0 && (
          <div style={{ marginTop: 24 }}>
            {pieces.map((p, i) => (
              <RepertoireCard key={i} piece={p} studentId={studentId} />
            ))}
            <div style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>
              These links search for the piece — always confirm the edition and availability before assigning.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

      </div>
      <div style={{ fontSize: 13.5, color: C.ink, marginTop: 8, lineHeight: 1.5 }}>{piece.why}</div>
      <div style={{ display: "flex", gap: 14, marginTop: 10 }}>
        <a href={piece.imslpUrl} target="_blank" rel="noopener" style={{ fontSize: 13, color: C.accent }}>Find on IMSLP →</a>
        <a href={piece.musicnotesUrl} target="_blank" rel="noopener" style={{ fontSize: 13, color: C.accent }}>Find on MusicNotes →</a>
      </div>
    </div>
  );
}

// ---------- App ----------

function App() {
  const [session, setSession] = useState(undefined); // undefined = loading, null = signed out
  const [view, setView] = useState("students");
  const [activeStudentId, setActiveStudentId] = useState(null);
  const [pendingDraft, setPendingDraft] = useState(null);
  const [pendingResult, setPendingResult] = useState(null);

  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = supabase.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (session === undefined) return null;
  if (!session) return <AuthScreen onAuthed={() => {}} />;

  const teacherId = session.user.id;

  const signOut = async () => { await supabase.auth.signOut(); };

  return (
    <div style={{ minHeight: "100vh" }}>
      {view === "students" && (
        <StudentsList
          teacherId={teacherId}
          onOpenStudent={(id) => { setActiveStudentId(id); setView("profile"); }}
          onSignOut={signOut}
        />
      )}
      {view === "profile" && (
        <StudentProfile
          studentId={activeStudentId}
          onBack={() => setView("students")}
          onNewLesson={(id) => { setActiveStudentId(id); setView("newLesson"); }}
          onFindRepertoire={(id) => { setActiveStudentId(id); setView("repertoire"); }}
        />
      )}
      {view === "repertoire" && (
        <RepertoireFinder
          studentId={activeStudentId}
          onBack={() => setView("profile")}
        />
      )}
      {view === "newLesson" && (
        <NewLessonNote
          studentId={activeStudentId}
          onBack={() => setView("profile")}
          onGenerated={(draft) => { setPendingDraft(draft); setView("draftReview"); }}
        />
      )}
      {view === "draftReview" && pendingDraft && (
        <DraftReview
          draft={pendingDraft}
          onApproved={(result) => { setPendingDraft(null); setPendingResult(result); setView("result"); }}
          onDiscard={() => { setPendingDraft(null); setView("profile"); }}
        />
      )}
      {view === "result" && pendingResult && (
        <ResultScreen
          result={pendingResult}
          onSaved={() => { setPendingResult(null); setView("profile"); }}
          onDiscard={() => { setPendingResult(null); setView("profile"); }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
